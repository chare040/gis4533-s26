<!-- 
    Assignment 1: Modify a leaflet web map
    In this assignment you will start with a working web map, and then modify and add to it.

    Task:

    1. Replace the tile layer with a different one.
    hint: use the Leaflet Providers page to find one: https://leaflet-extras.github.io/leaflet-providers/preview/
    2. Add new markers to the map at three of your favorite locations around Duluth.
    - Each marker should have a popup that includes the name of the location and a fun fact about it.
    - At least one of the markers should have an image or video in the popup.
    - You can remove the existing marker for the UMD campus if you want.
    3. Center the map on Duluth (change the zoom level as well if you want).
    4. Modify the title and subtitle to reflect your name and the theme of your map.
    5. Add a paragraph to the paragraph describing your map and the locations you added.
    6. Modify the style of each of the elements (header, paragraph, and map) to your liking.
    - At a minimum, remove the inline style on the map div and add your own CSS to the style tag in the head of the document.

    AI use: you can ask questions of AI (such as "explain what this line of code does" or "how do I create a popup in Leaflet?") 
    But try and write the code yourself. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Most Basic Web Map</title>
    
    <!-- Leaflet CSS stylesheet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
		#map {
			width: 600px;
			height: 400px;
		}
	</style>
</head>
<body>
    <!-- Header at the top of the page -->
    <div class="header">
        <h1>A Mostly Basic Web Map</h1>
        <h3>by: Your Name Here</h3>
    </div>
    <div id="map"></div>
    
    <!-- Leaflet JavaScript library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialize the map, center it on UMD campus, and set the zoom level
        const map = L.map('map').setView([46.7867, -92.1005], 13);

L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
    maxZoom: 20,
    attribution: '© OpenStreetMap France | © OpenStreetMap contributors'
}).addTo(map);

// Remove this if you don't want the UMD marker
// const marker = L.marker([46.82, -92.085]).addTo(map);
// marker.bindPopup("<b>University of Minnesota Duluth</b><br>A great place to learn about GIS!");

// Lake Superior Railroad Museum
L.marker([46.7833, -92.1002]).addTo(map)
  .bindPopup("<b>Lake Superior Railroad Museum</b><br>Fun fact: It houses one of the largest collections of historic locomotives in the U.S.");

// Marcus Duluth Cinema
L.marker([46.7814, -92.1020]).addTo(map)
  .bindPopup("<b>Marcus Duluth Cinema</b><br>Fun fact: It’s one of the only theaters in the region with full recliner seating.");

// Aerial Lift Bridge (with image)
L.marker([46.7785, -92.0933]).addTo(map)
  .bindPopup(`
      <b>Aerial Lift Bridge</b><br>
      Fun fact: The bridge rises about 25 times per day during summer!<br>
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Duluth_aerial_lift_bridge.jpg" width="180">
  `);

    </script>
</body>
</html>
